<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Gym Planner & Log</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --background: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 550px; }
        h1, h2, h3 { text-align: center; margin-top: 5px; }
        
        /* Navigation / Tabs */
        .nav-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            background: var(--card);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .nav-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .nav-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .set-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .set-number { font-weight: bold; width: 60px; color: var(--text-muted); }
        
        .btn {
            width: 100%; border: none; padding: 12px; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; margin-bottom: 10px;}
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); margin-bottom: 15px;}
        .btn-danger { background: transparent; border: none; color: var(--danger); cursor: pointer; font-size: 14px; }

        .log-item { border-bottom: 1px solid var(--border); padding: 15px 0; display: flex; justify-content: space-between; }
        .log-date { font-size: 12px; color: var(--text-muted); }
        .log-title { font-weight: bold; font-size: 18px; }
        .set-info { font-size: 14px; color: #cbd5e1; list-style: none; padding: 0; margin: 5px 0 0 0; }

        /* Progress Styles */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-box { background: #0f172a; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border);}
        .stat-val { font-size: 18px; font-weight: bold; color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h1>🏋️‍♂️ Ultimate Gym App</h1>
    
    <!-- Tab Navigation -->
    <div class="nav-tabs">
        <button class="nav-btn active" onclick="switchTab('logTab')">Logbuch</button>
        <button class="nav-btn" onclick="switchTab('planTab')">Pläne</button>
        <button class="nav-btn" onclick="switchTab('progressTab')">Fortschritt</button>
    </div>

    <!-- TAB 1: LOGBUCH -->
    <div id="logTab" class="tab-content active">
        <div class="card">
            <h2>Training loggen</h2>
            <div class="form-group">
                <label for="workoutSelect">Wähle ein erstelltes Training:</label>
                <select id="workoutSelect" onchange="loadPlannedExercises()"></select>
            </div>
            <form id="logForm">
                <div class="form-group">
                    <label for="uebungSelect">Übung</label>
                    <select id="uebungSelect" required></select>
                </div>
                <label>Sätze</label>
                <div id="setsContainer"></div>
                <button type="button" class="btn btn-secondary" id="addSetBtn">+ Satz hinzufügen</button>
                <button type="submit" class="btn btn-primary">Sätze speichern</button>
            </form>
        </div>

        <div class="card">
            <h2>Verlauf</h2>
            <div id="logVerlauf">Noch keine Einträge vorhanden.</div>
        </div>
    </div>

    <!-- TAB 2: PLÄNE ERSTELLEN -->
    <div id="planTab" class="tab-content">
        <div class="card">
            <h2>Neues Training erstellen</h2>
            <form id="planForm">
                <div class="form-group">
                    <label for="planName">Name des Workouts (z.B. Push, Beine)</label>
                    <input type="text" id="planName" placeholder="Workout Name" required>
                </div>
                <div class="form-group">
                    <label for="planExercises">Übungen (mit Komma trennen)</label>
                    <input type="text" id="planExercises" placeholder="Bankdrücken, Kniebeugen, ... " required>
                </div>
                <button type="submit" class="btn btn-success">Workout-Plan speichern</button>
            </form>
        </div>
        <div class="card">
            <h2>Deine Trainingspläne</h2>
            <div id="planListe">Keine Pläne erstellt.</div>
        </div>
    </div>

    <!-- TAB 3: FORTSCHRITT ABRUFEN -->
    <div id="progressTab" class="tab-content">
        <div class="card">
            <h2>Dein Fortschritt</h2>
            <div class="form-group">
                <label for="progressExerciseSelect">Übung auswählen:</label>
                <select id="progressExerciseSelect" onchange="renderProgress()"></select>
            </div>
            <div id="progressOutput">Wähle eine Übung aus, um Statistiken zu sehen.</div>
        </div>
    </div>
</div>

<script>
    // Tab-Wechsel-Logik
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
        
        // Dropdowns aktualisieren, falls sich Pläne/Logs geändert haben
        updateDropdowns();
        if(tabId === 'progressTab') renderProgress();
    }

    let setCount = 0;
    const setsContainer = document.getElementById('setsContainer');

    function addSetRow(gewicht = '', reps = '') {
        setCount++;
        const setRow = document.createElement('div');
        setRow.className = 'set-row';
        setRow.innerHTML = `
            <div class="set-number">Satz ${setCount}</div>
            <input type="number" class="set-weight" placeholder="kg" value="${gewicht}" required step="any">
            <input type="number" class="set-reps" placeholder="Wdh." value="${reps}" required>
        `;
        setsContainer.appendChild(setRow);
    }
    document.getElementById('addSetBtn').addEventListener('click', () => addSetRow());

    // --- DATEN-MANAGEMENT (LocalStorage) ---
    function getData(key) { return JSON.parse(localStorage.getItem(key)) || []; }
    function saveData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

    // --- WORKOUT PLÄNE ERSTELLEN ---
    document.getElementById('planForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('planName').value;
        const uebungen = document.getElementById('planExercises').value.split(',').map(s => s.trim()).filter(s => s.length > 0);
        
        let plaene = getData('gymPlaene');
        plaene.push({ id: Date.now(), name, uebungen });
        saveData('gymPlaene', plaene);
        
        document.getElementById('planForm').reset();
        renderPlaene();
        updateDropdowns();
    });

    function renderPlaene() {
        let plaene = getData('gymPlaene');
        const list = document.getElementById('planListe');
        if(plaene.length === 0) { list.innerHTML = "Keine Pläne erstellt."; return; }
        
        list.innerHTML = plaene.map(p => `
            <div style="border-bottom: 1px solid var(--border); padding: 10px 0; display:flex; justify-content:space-between;">
                <div><strong>${p.name}</strong><br><small style="color:var(--text-muted)">${p.uebungen.join(', ')}</small></div>
                <button class="btn-danger" onclick="deletePlan(${p.id})">Löschen</button>
            </div>
        `).join('');
    }

    function deletePlan(id) {
        saveData('gymPlaene', getData('gymPlaene').filter(p => p.id !== id));
        renderPlaene();
        updateDropdowns();
    }

    // --- LOGBUCH LOGIK ---
    function updateDropdowns() {
        let plaene = getData('gymPlaene');
        let logs = getData('gymLogs');
        
        // Workout-Auswahl
        const wSelect = document.getElementById('workoutSelect');
        wSelect.innerHTML = '<option value="">-- Bitte wählen --</option>' + plaene.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        
        // Alle jemals geloggten Übungen für Statistik sammeln
        const alleUebungen = new Set();
        plaene.forEach(p => p.uebungen.forEach(u => alleUebungen.add(u)));
        logs.forEach(l => alleUebungen.add(l.uebung));
        
        const pSelect = document.getElementById('progressExerciseSelect');
        pSelect.innerHTML = Array.from(alleUebungen).map(u => `<option value="${u}">${u}</option>`).join('');
    }

    function loadPlannedExercises() {
        const planId = document.getElementById('workoutSelect').value;
        const uSelect = document.getElementById('uebungSelect');
        if(!planId) { uSelect.innerHTML = ''; return; }
        
        const plan = getData('gymPlaene').find(p => p.id == planId);
        uSelect.innerHTML = plan.uebungen.map(u => `<option value="${u}">${u}</option>`).join('');
    }

    document.getElementById('logForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const uebung = document.getElementById('uebungSelect').value;
        if(!uebung) return;

        const weightInputs = document.querySelectorAll('.set-weight');
        const repsInputs = document.querySelectorAll('.set-reps');
        
        let saetze = [];
        for(let i = 0; i < weightInputs.length; i++) {
            saetze.push({ gewicht: parseFloat(weightInputs[i].value), wiederholungen: parseInt(repsInputs[i].value) });
        }

        const datum = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        const neuerEintrag = { id: Date.now(), timestamp: Date.now(), datum, uebung, saetze };

        let logs = getData('gymLogs');
        logs.unshift(neuerEintrag);
        saveData('gymLogs', logs);

        // Reset Form
        setsContainer.innerHTML = ''; setCount = 0; addSetRow();
        renderLogs();
    });

    function renderLogs() {
        let logs = getData('gymLogs');
        const verlauf = document.getElementById('logVerlauf');
        if (logs.length === 0) { verlauf.innerHTML = 'Noch keine Einträge vorhanden.'; return; }

        verlauf.innerHTML = logs.map(log => `
            <div class="log-item">
                <div>
                    <div class="log-date">${log.datum}</div>
                    <div class="log-title">${log.uebung}</div>
                    <ul class="set-info">
                        ${log.saetze.map((s, idx) => `<li>Satz ${idx + 1}: ${s.gewicht} kg × ${s.wiederholungen}</li>`).join('')}
                    </ul>
                </div>
                <button class="btn-danger" onclick="deleteLog(${log.id})">Löschen</button>
            </div>
        `).join('');
    }

    function deleteLog(id) {
        saveData('gymLogs', getData('gymLogs').filter(l => l.id !== id));
        renderLogs();
    }

    // --- FORTSCHRITT/STATISTIK BERECHNEN ---
    function renderProgress() {
        const uebung = document.getElementById('progressExerciseSelect').value;
        const output = document.getElementById('progressOutput');
        if(!uebung) { output.innerHTML = "Wähle eine Übung aus."; return; }

        // Filter alle Logs für diese eine Übung, sortiert nach Datum (älteste zuerst für den Verlauf)
        let uebungsLogs = getData('gymLogs').filter(l => l.uebung === uebung).sort((a,b) => a.timestamp - b.timestamp);
        
        if(uebungsLogs.length === 0) { output.innerHTML = "Für diese Übung gibt es noch keine Einträge."; return; }

        let html = `<h3>Verlauf für ${uebung}</h3>`;

        uebungsLogs.forEach(log => {
            let maxGewicht = 0;
            let gesamtVolumen = 0;
            let bestes1RM = 0;

            log.saetze.forEach(s => {
                let vol = s.gewicht * s.wiederholungen;
                gesamtVolumen += vol;
                if(s.gewicht > maxGewicht) maxGewicht = s.gewicht;
                
                // Epley-Formel zur Berechnung des geschätzten 1RM (Maximalgewicht bei 1 Wdh.)
                let estimated1RM = s.wiederholungen === 1 ? s.gewicht : s.gewicht * (1 + s.wiederholungen / 30);
                if(estimated1RM > bestes1RM) bestes1RM = estimated1RM;
            });

            html += `
                <div style="background:#1e293b; padding:12px; border-radius:8px; margin-bottom:10px; border:1px solid var(--border);">
                    <div style="font-size:12px; color:var(--text-muted);">${log.datum}</div>
                    <div class="stat-grid">
                        <div class="stat-box">Volumen: <span class="stat-val">${gesamtVolumen.toFixed(1)} kg</span></div>
                        <div class="stat-box">Est. 1RM: <span class="stat-val" style="color:#2563eb">${bestes1RM.toFixed(1)} kg</span></div>
                    </div>
                </div>
            `;
        });

        output.innerHTML = html;
    }

    // Initialisierung beim Laden
    document.addEventListener('DOMContentLoaded', () => {
        addSetRow();
        renderPlaene();
        renderLogs();
        updateDropdowns();
    });
</script>

</body>
</html>
